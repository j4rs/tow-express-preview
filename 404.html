<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page Not Found | Tow Express</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#c8102e">
<style>
  :root{ --red:#c8102e; --red-dark:#9c0c23; --ink:#161616; --gold:#f5b301; }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; min-height:100%; display:flex; align-items:center; justify-content:center; text-align:center;
    padding:28px 20px; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(180deg,#1b1b1f 0%,#2a2a30 100%);
  }
  .box{max-width:560px; width:100%}
  .brand{font-weight:800; letter-spacing:.5px; font-size:1.25rem; margin-bottom:26px}
  .brand span{color:var(--red)}
  .code{font-size:clamp(4.5rem,18vw,8rem); font-weight:900; line-height:1;
    background:linear-gradient(90deg,var(--red),var(--gold)); -webkit-background-clip:text;
    background-clip:text; color:transparent; margin-bottom:8px}
  h1{font-size:clamp(1.4rem,5vw,2rem); margin:0 0 .35em}
  p{color:#c9c9d2; font-size:1.05rem; margin:0 auto 28px; max-width:440px}
  .cta{display:flex; gap:12px; justify-content:center; flex-wrap:wrap}
  .btn{display:inline-flex; align-items:center; justify-content:center; gap:7px; min-height:48px;
    padding:14px 24px; border-radius:11px; font-weight:700; text-decoration:none; font-size:1.08rem;
    transition:transform .15s ease, box-shadow .15s ease, background .15s ease}
  .btn.call{background:var(--red); color:#fff; box-shadow:0 6px 18px rgba(200,16,46,.4)}
  .btn.call:hover{background:var(--red-dark); transform:translateY(-2px)}
  .btn.home{background:rgba(255,255,255,.08); color:#fff; border:2px solid rgba(255,255,255,.65)}
  .btn.home:hover{background:#fff; color:var(--red); border-color:#fff}
  .foot{margin-top:30px; color:#8f8f99; font-size:.9rem}
</style>
</head>
<body>
  <div class="box">
    <div class="brand">TOW <span>EXPRESS</span></div>
    <div class="code">404</div>
    <h1 data-en="Page not found" data-es="Página no encontrada">Page not found</h1>
    <p data-en="The page you're looking for isn't here — but we're still on the road 24/7. Need a tow right now? Give us a call."
       data-es="La página que busca no está aquí — pero seguimos en la carretera 24/7. ¿Necesita una grúa ahora? Llámenos.">The page you're looking for isn't here — but we're still on the road 24/7. Need a tow right now? Give us a call.</p>
    <div class="cta">
      <a href="tel:+13055510077" class="btn call">📞 <span data-en="Call (305) 551-0077" data-es="Llamar (305) 551-0077">Call (305) 551-0077</span></a>
      <a href="/" class="btn home"><span data-en="← Back to home" data-es="← Volver al inicio">← Back to home</span></a>
    </div>
    <div class="foot" data-en="24/7 Towing &amp; Roadside Assistance · Miami-Dade"
         data-es="Grúas y Asistencia en Carretera 24/7 · Miami-Dade">24/7 Towing &amp; Roadside Assistance · Miami-Dade</div>
  </div>

  <script>
  (function(){
    var saved=null; try{ saved=localStorage.getItem('te_lang'); }catch(e){}
    if(saved!=='en' && saved!=='es') saved=null;
    var browserEs=(navigator.language||navigator.userLanguage||'en').toLowerCase().indexOf('es')===0;
    var lang = saved ? saved : (browserEs ? 'es' : 'en');
    document.documentElement.setAttribute('lang', lang);
    document.querySelectorAll('[data-en]').forEach(function(el){
      var v=el.getAttribute('data-'+lang); if(v!=null) el.textContent=v;
    });
    if(lang==='es') document.title='Página no encontrada | Tow Express';
  })();
  </script>
</body>
</html>
